server:
  port: 8085

spring:
  application:
    name: fundtrack-notification-service
  
  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/fundtrack_notification_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: Sonu@4002  # Update this to your MySQL password
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate Settings
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Config Server (If you are using one)
  config:
    import: "optional:configserver:http://localhost:8888"

# Eureka Discovery Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    instance:
      prefer-ip-address: true

# Feign Logging (Useful for debugging your Audit calls)
logging:
  level:
    com.cts.fundtrack: DEBUG
    org.springframework.security: DEBUG
    feign: DEBUG

# Actuator for Health Checks
management:
  endpoints:
    web:
      exposure:
        include: health, info, beans
  endpoint:
    health:
      show-details: always
server:
  port: 9094
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

spring:
  application:
    name: fundtrack-disbursement-service
  
  # 🛠️ Database Configuration (Fixes your current error)
  datasource:
    url: jdbc:mysql://localhost:3306/disbursement_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root # Update this!
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# 🛰️ Service Discovery
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1 # Crucial for local microservice networking

# 🛡️ Resiliency & Communication
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Enable Feign Circuit Breakers (Required for your Fallbacks)
feign:
  circuitbreaker:
    enabled: true

# 🩺 Monitoring & Management
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
# Server Configuration
server.port=9090
spring.application.name=fundtrack-api-gateway

# Gateway Discovery Settings (kept for Eureka-based lb:// URI resolution)
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# ── Explicit Route Definitions (Spring Cloud Gateway 4.x / 2024.x namespace) ──

# Identity Service  (auth, login, register)
spring.cloud.gateway.server.webflux.routes[0].id=identity-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://fundtrack-identity-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/auth/**

# Program Service
spring.cloud.gateway.server.webflux.routes[1].id=program-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://fundtrack-program-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/programs/**

# Application Service  (applications, reviews, decisions)
spring.cloud.gateway.server.webflux.routes[2].id=application-service-applications
spring.cloud.gateway.server.webflux.routes[2].uri=lb://fundtrack-application-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/applications/**

spring.cloud.gateway.server.webflux.routes[3].id=application-service-reviews
spring.cloud.gateway.server.webflux.routes[3].uri=lb://fundtrack-application-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/reviews/**

spring.cloud.gateway.server.webflux.routes[4].id=application-service-decisions
spring.cloud.gateway.server.webflux.routes[4].uri=lb://fundtrack-application-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/v1/decisions/**

# Analytics Service
spring.cloud.gateway.server.webflux.routes[5].id=analytics-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://fundtrack-analytics-service
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/v1/analytics/**

# Audit Service (identity service handles audit endpoints)
spring.cloud.gateway.server.webflux.routes[11].id=audit-service
spring.cloud.gateway.server.webflux.routes[11].uri=lb://fundtrack-identity-service
spring.cloud.gateway.server.webflux.routes[11].predicates[0]=Path=/api/v1/audit/**

# Disbursement Service  (disbursements, compliance, payments, reports)
spring.cloud.gateway.server.webflux.routes[6].id=disbursement-service
spring.cloud.gateway.server.webflux.routes[6].uri=lb://fundtrack-disbursement-service
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/v1/disbursements/**

spring.cloud.gateway.server.webflux.routes[7].id=compliance-service
spring.cloud.gateway.server.webflux.routes[7].uri=lb://fundtrack-disbursement-service
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/api/v1/compliance/**

spring.cloud.gateway.server.webflux.routes[8].id=payment-service
spring.cloud.gateway.server.webflux.routes[8].uri=lb://fundtrack-disbursement-service
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/api/v1/payments/**

spring.cloud.gateway.server.webflux.routes[9].id=report-service
spring.cloud.gateway.server.webflux.routes[9].uri=lb://fundtrack-disbursement-service
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/api/v1/reports/**

spring.cloud.gateway.server.webflux.routes[12].id=file-service
spring.cloud.gateway.server.webflux.routes[12].uri=lb://fundtrack-disbursement-service
spring.cloud.gateway.server.webflux.routes[12].predicates[0]=Path=/api/v1/files/**

spring.cloud.gateway.server.webflux.routes[13].id=application-file-service
spring.cloud.gateway.server.webflux.routes[13].uri=lb://fundtrack-application-service
spring.cloud.gateway.server.webflux.routes[13].predicates[0]=Path=/api/v1/application-files/**

# Notification Service
spring.cloud.gateway.server.webflux.routes[10].id=notification-service
spring.cloud.gateway.server.webflux.routes[10].uri=lb://fundtrack-notification-service
spring.cloud.gateway.server.webflux.routes[10].predicates[0]=Path=/api/v1/notifications/**

# Security Properties
security.jwt.secret=mysecretmysecretmysecretmysecret

# Eureka Discovery Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# Debugging (Keep these to see the Java routes load)
logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.http.server.reactive=DEBUG
logging.level.org.springframework.cloud.loadbalancer=DEBUG

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=true
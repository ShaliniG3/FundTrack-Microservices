# 1. Server Port (Standard Eureka Port)
server.port=8761

# 2. Application Name
spring.application.name=discovery-server

# 3. Eureka Instance Configuration
eureka.instance.hostname=localhost

# 4. Eureka Client Configuration
# We set these to 'false' because this is the server itself. 
# It doesn't need to register with a partner or fetch a registry.
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# 5. Service URL
# This is where other services (Identity, Finance, etc.) will look for this registry
eureka.client.service-url.defaultZone=http://${eureka.instance.hostname}:${server.port}/eureka/

# 6. Self-Preservation (Optional for Dev)
# Set to false during development so that if you stop a service, 
# it disappears from the dashboard immediately.
eureka.server.enable-self-preservation=false
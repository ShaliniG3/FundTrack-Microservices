server:
  port: 8081 # The entry point for all client requests (Postman, Frontend, etc.)

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # --- ROUTE 1: IDENTITY SERVICE ---
        # This route is "Public." We don't apply the AuthenticationFilter here
        # because users need to access /login and /register without a token.
        - id: identity-service
          uri: lb://identity-service # "lb://" uses Eureka to find an available instance
          predicates:
            - Path=/api/v1/auth/** # Any request starting with this path is sent here

        # --- ROUTE 2: ANALYTICS SERVICE ---
        # This route is "Private" and "Resilient."
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            # FILTER 1: Security & RBAC
            # Custom filter that calls Identity Service to validate JWT.
            # Only users with the "ADMIN" role are allowed through.
            - name: AuthenticationFilter
              args:
                role: "ADMIN"

            # FILTER 2: Fault Tolerance
            # If the Analytics Service is down or slow, this prevents the Gateway from hanging.
            - name: CircuitBreaker
              args:
                name: analyticsCB # Matches the Resilience4j instance name below
                fallbackUri: forward:/fallback/analytics # Local endpoint to call on failure

# --- RESILIENCE4J CONFIGURATION ---
# This defines HOW the Circuit Breaker behaves.
resilience4j:
  circuitbreaker:
    instances:
      analyticsCB:
        # Tracks the last 10 requests to calculate the failure rate.
        slidingWindowSize: 10
        # If 50% (5 out of 10) of requests fail, the circuit "opens" (breaks).
        failureRateThreshold: 50
        # Once broken, the Gateway stops trying to hit the service for 15 seconds.
        # During this time, every request immediately goes to the Fallback.
        waitDurationInOpenState: 15s
  timelimiter:
    instances:
      analyticsCB:
        # If the Analytics Service takes longer than 3 seconds to respond,
        # the Gateway considers it a failure and triggers the Circuit Breaker logic.
        timeoutDuration: 3s

# --- SERVICE DISCOVERY ---
# Tells the Gateway where the Eureka server is so it can find 'identity-service'
# and 'analytics-service' by their names instead of static IP addresses.
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8090

spring:
  application:
    name: fundtrack-analytics-service

  datasource:
    url: jdbc:mysql://localhost:3306/fundtrack_analytics_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: WilliamAsher@24
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  config:
    import: "optional:configserver:http://localhost:8888/"

  cloud:
    openfeign:
      circuitbreaker:
        enabled: false

resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
  timelimiter:
    instances:
      default:
        timeout-duration: 10s

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always